name: Contract Test

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout PHP SDK
        uses: actions/checkout@v4
        with:
          repository: noriapp/nori-php
          path: nori-php

      - name: Download latest OpenAPI spec
        run: |
          if ! curl -fsSL https://raw.githubusercontent.com/noriapp/nori/main/openapi.yaml \
            -o /tmp/openapi.yaml; then
            echo "WARN: remote OpenAPI spec is not accessible from this workflow; skipping remote contract check"
            rm -f /tmp/openapi.yaml
          fi

      - name: Verify evaluate endpoint exists
        run: |
          if [ ! -f /tmp/openapi.yaml ]; then
            echo "Skipping evaluate endpoint contract check because the remote spec could not be downloaded"
            exit 0
          fi
          if ! grep -q '/api/v1/evaluate' /tmp/openapi.yaml; then
            echo "ERROR: /api/v1/evaluate endpoint missing from spec"
            exit 1
          fi
          echo "Contract check passed"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Configure local PHP SDK repository
        run: |
          composer config repositories.nori-php path ./nori-php
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install dependencies
        run: composer install --no-interaction
